<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة إلى القائد</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* غير الرابط أدناه إلى رابط الصورة التي تريدها */
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        h1 { color: #2c3e50; margin-bottom: 15px; }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #3498db;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 40px;
            cursor: pointer;
        }
        button:hover { background: #2c3e50; }
        #status { margin-top: 15px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h1>📬 رسالة إلى القائد</h1>
        <p>اكتب مشكلتك (بدون اسم) وسيتم إرسالها فوراً</p>
        <textarea id="msg" placeholder="مشكلتك هنا..."></textarea>
        <br>
        <button onclick="send()">إرسال</button>
        <div id="status"></div>
    </div>

    <script>
    function send() {
        let msg = document.getElementById('msg').value.trim();
        let status = document.getElementById('status');
        if (msg === '') {
            status.innerHTML = '❌ اكتب شيئاً';
            return;
        }
        status.innerHTML = '⏳ جاري الإرسال...';
        
        fetch('send.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'message=' + encodeURIComponent(msg)
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                status.innerHTML = '✅ تم الإرسال';
                document.getElementById('msg').value = '';
            } else {
                status.innerHTML = '❌ خطأ: ' + d.error;
            }
        })
        .catch(e => {
            status.innerHTML = '❌ فشل الاتصال';
        });
    }
    </script>
</body>
</html>
