<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرآة الشباب - رسالة إلى القائد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0 url('https://via.placeholder.com/1920x1080?text=خلفية+المشاكل') no-repeat center center fixed;
            background-size: cover;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(5px);
        }
        h1 {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #34495e;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #3498db;
            border-radius: 10px;
            resize: vertical;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.9);
            outline: none;
        }
        textarea:focus {
            border-color: #2c3e50;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 5px 15px rgba(52,152,219,0.4);
        }
        button:hover {
            background-color: #2c3e50;
        }
        #status {
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 30px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📬 رسالة إلى القائد</h1>
        <p class="subtitle">اكتب مشكلتك أو اقتراحك، وسيصل إلى القائد مباشرة دون ذكر اسمك</p>
        <textarea id="message" placeholder="اكتب مشكلتك هنا ..."></textarea>
        <br>
        <button onclick="sendMessage()">إرسال المشكلة</button>
        <div id="status"></div>
        <div class="footer">جميع الرسائل مجهولة المصدر</div>
    </div>

    <script>
        function sendMessage() {
            var message = document.getElementById('message').value.trim();
            if (message === '') {
                document.getElementById('status').innerHTML = '❌ الرجاء كتابة المشكلة أولاً.';
                return;
            }

            document.getElementById('status').innerHTML = '⏳ جاري الإرسال...';
            document.getElementById('status').style.color = '#2c3e50';

            fetch('send.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'message=' + encodeURIComponent(message)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('status').innerHTML = '✅ تم إرسال المشكلة بنجاح!';
                    document.getElementById('status').style.color = 'green';
                    document.getElementById('message').value = '';
                } else {
                    document.getElementById('status').innerHTML = '❌ فشل الإرسال: ' + data.error;
                    document.getElementById('status').style.color = 'red';
                }
            })
            .catch(error => {
                document.getElementById('status').innerHTML = '❌ حدث خطأ في الاتصال: ' + error;
                document.getElementById('status').style.color = 'red';
            });
        }
    </script>
</body>
</html>
